<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmări — {{nume}}</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💌</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf9f4; --ink: #27343a; --ink-soft: #566670; --muted: #8b9aa0;
    --teal: #2a9d8f; --teal-dark: #1f7468; --blue: #2e7fa3; --peach: #f0a05a;
    --card: #fffdfa; --line: #e9e2d6; --red: #b04a2f;
    --grad: linear-gradient(135deg, #2fa08f, #2e7fa3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(640px 480px at 88% -6%, rgba(42, 157, 143, .14), transparent 65%),
      radial-gradient(760px 560px at -8% 24%, rgba(46, 127, 163, .12), transparent 65%),
      radial-gradient(640px 540px at 55% 108%, rgba(240, 160, 90, .12), transparent 65%),
      linear-gradient(180deg, #fefbf8 0%, #faf3ef 100%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 760px; margin: 0 auto; padding: 28px 16px 48px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 24px;
    box-shadow: 0 18px 50px -22px rgba(40, 62, 68, .3);
    padding: 26px 20px;
  }
  h1 { font-family: 'Caveat', cursive; font-size: 40px; font-weight: 700; color: var(--ink); text-align: center; }
  .sub { text-align: center; font-size: 12px; color: var(--muted); letter-spacing: .2em; text-transform: uppercase; margin: 2px 0 22px; }

  #login { max-width: 340px; margin: 0 auto; }
  input[type="password"], .search {
    width: 100%; font-family: inherit; font-size: 16px; color: var(--ink);
    background: #fff; border: 1.5px solid var(--line); border-radius: 12px;
    padding: 12px 14px; outline: none;
  }
  input:focus, .search:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(42, 157, 143, .16); }
  .btn {
    width: 100%; font-family: inherit; font-size: 16px; font-weight: 600; color: #fff;
    background: var(--grad);
    border: 0; border-radius: 12px; padding: 13px; cursor: pointer; margin-top: 12px;
    box-shadow: 0 10px 22px -10px rgba(31, 116, 104, .5);
    transition: transform .15s, filter .15s;
  }
  .btn:hover { transform: translateY(-1px); filter: brightness(1.04); }
  .err { display: none; color: #9c3f22; background: #fbeee6; border: 1px solid #eccab4; border-radius: 10px; padding: 10px 12px; font-size: 14px; margin-bottom: 12px; }
  .err.show { display: block; }

  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 18px; }
  @media (min-width: 560px) { .stats { grid-template-columns: repeat(4, 1fr); } }
  .stat {
    border: 1px solid var(--line); border-radius: 16px; padding: 14px 8px 12px;
    text-align: center; background: linear-gradient(180deg, #fff, #f6f4ec);
  }
  .stat .ico { font-size: 22px; }
  .stat b { display: block; font-size: 26px; color: var(--ink); line-height: 1.2; }
  .stat small { font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
  .toolbar .search { flex: 1 1 160px; width: auto; padding: 9px 13px; font-size: 14px; border-radius: 999px; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-family: inherit; font-size: 13.5px; color: var(--ink-soft);
    background: #fff; border: 1.5px solid var(--line); border-radius: 999px;
    padding: 8px 14px; cursor: pointer; transition: all .15s;
  }
  .chip[aria-pressed="true"] { background: var(--teal); border-color: var(--teal); color: #fff; font-weight: 600; }

  .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 16px; background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 14.5px; min-width: 430px; }
  th {
    text-align: left; font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); font-weight: 600; padding: 12px 12px 10px;
    border-bottom: 1.5px solid var(--line); background: #f7f4ec;
    white-space: nowrap;
  }
  th.c, td.c { text-align: center; }
  td { padding: 12px; border-bottom: 1px solid #f0ebdf; vertical-align: top; }
  tr:last-child td { border-bottom: 0; }
  tbody tr { transition: background .15s; }
  tbody tr:hover { background: #f8f5ed; }
  .name { font-weight: 600; color: var(--ink); }
  .when { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .msg { font-size: 13px; color: var(--ink-soft); font-style: italic; margin-top: 6px; background: #f5f2e9; border-radius: 8px; padding: 6px 10px; max-width: 380px; }
  .pill { display: inline-block; font-size: 12.5px; font-weight: 600; border-radius: 999px; padding: 4px 10px; white-space: nowrap; }
  .pill.yes { background: rgba(42, 157, 143, .15); color: var(--teal-dark); }
  .pill.no { background: rgba(176, 74, 47, .12); color: var(--red); }
  .persons-badge { display: inline-block; min-width: 28px; font-weight: 600; color: var(--ink); background: rgba(46, 127, 163, .12); border-radius: 999px; padding: 4px 8px; font-size: 13.5px; }
  .del {
    font-family: inherit; width: 30px; height: 30px; border-radius: 999px;
    border: 1.5px solid #ecd0c2; background: #fdf3ec; color: var(--red);
    font-size: 15px; line-height: 1; cursor: pointer; transition: all .15s;
  }
  .del:hover { background: var(--red); border-color: var(--red); color: #fff; }

  .empty { text-align: center; color: var(--muted); font-style: italic; padding: 34px 10px; }
  .empty .big { font-size: 40px; margin-bottom: 8px; font-style: normal; }

  .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; flex-wrap: wrap; gap: 10px; }
  .link { font-family: inherit; background: none; border: 0; font-size: 14px; color: var(--teal-dark); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; }
  a.link { display: inline-block; }
  #panel { display: none; }
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <h1>Confirmări ✨</h1>
    <p class="sub">{{nume}} · Momente Dragi</p>

    <div id="login">
      <div class="err" id="login-err">Parolă incorectă</div>
      <input type="password" id="password" placeholder="Introduceți parola" autocomplete="current-password">
      <button class="btn" id="login-btn">Intră</button>
    </div>

    <div id="panel">
      <div class="stats">
        <div class="stat"><div class="ico">📋</div><b id="st-total">0</b><small>Confirmări</small></div>
        <div class="stat"><div class="ico">👥</div><b id="st-persons">0</b><small>Persoane</small></div>
        <div class="stat"><div class="ico">🕊️</div><b id="st-church">0</b><small>La biserică</small></div>
        <div class="stat"><div class="ico">🦜</div><b id="st-party">0</b><small>La petrecere</small></div>
        <div class="stat" id="st-views-box" style="display:none"><div class="ico">👁️</div><b id="st-views">0</b><small>Vizualizări</small></div>
      </div>

      <div class="toolbar">
        <input type="text" class="search" id="search" placeholder="🔍 Caută după nume…">
        <div class="chips" role="group" aria-label="Filtre">
          <button class="chip" data-filter="all" aria-pressed="true">Toate</button>
          <button class="chip" data-filter="church" aria-pressed="false">🕊️ Biserică</button>
          <button class="chip" data-filter="party" aria-pressed="false">🦜 Petrecere</button>
        </div>
        <button class="chip" id="export-btn" style="display:none" title="Descarcă lista invitaților (Excel/CSV)">⬇️ Exportă lista</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nume</th>
              <th class="c">Pers.</th>
              <th class="c">Biserică</th>
              <th class="c">Petrecere</th>
              <th class="c"></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="empty" id="empty" style="display:none">
          <div class="big">🌿</div>
          Nicio confirmare încă
        </div>
      </div>

      <div class="foot">
        <a class="link" href="/{{slug}}">← Vezi invitația</a>
        <button class="link" id="logout-btn">Deconectare</button>
      </div>
    </div>
  </div>
</div>

<script>
  const SLUG = '{{slug}}';
  const PW_KEY = 'fam-pw-' + SLUG;

  const loginBox = document.getElementById('login');
  const panel = document.getElementById('panel');
  const errBox = document.getElementById('login-err');
  const pwInput = document.getElementById('password');
  const tbody = document.getElementById('tbody');
  const emptyBox = document.getElementById('empty');

  let allRsvps = [];
  let filter = 'all';
  let query = '';

  function pw() { return sessionStorage.getItem(PW_KEY) || ''; }

  function updateStats() {
    document.getElementById('st-total').textContent = allRsvps.length;
    document.getElementById('st-persons').textContent = allRsvps.reduce((s, r) => s + (r.persons || 1), 0);
    document.getElementById('st-church').textContent = allRsvps.filter(r => r.church).reduce((s, r) => s + (r.persons || 1), 0);
    document.getElementById('st-party').textContent = allRsvps.filter(r => r.party).reduce((s, r) => s + (r.persons || 1), 0);
  }

  function pill(v) {
    return '<span class="pill ' + (v ? 'yes">Da ✓' : 'no">Nu ✗') + '</span>';
  }

  function render() {
    let rows = allRsvps.slice().reverse();
    if (filter === 'church') rows = rows.filter(r => r.church);
    if (filter === 'party') rows = rows.filter(r => r.party);
    if (query) rows = rows.filter(r => (r.name || '').toLowerCase().includes(query));

    tbody.innerHTML = '';
    emptyBox.style.display = rows.length ? 'none' : 'block';
    emptyBox.lastChild.textContent = allRsvps.length ? 'Niciun rezultat pentru filtrele alese' : 'Nicio confirmare încă';

    rows.forEach((r) => {
      const tr = document.createElement('tr');

      const tdName = document.createElement('td');
      const nm = document.createElement('div');
      nm.className = 'name';
      nm.textContent = r.name;
      tdName.appendChild(nm);
      if (r.createdAt) {
        const when = document.createElement('div');
        when.className = 'when';
        when.textContent = new Date(r.createdAt).toLocaleString('ro-RO', { dateStyle: 'short', timeStyle: 'short' });
        tdName.appendChild(when);
      }
      if (r.message) {
        const msg = document.createElement('div');
        msg.className = 'msg';
        msg.textContent = '💬 ' + r.message;
        tdName.appendChild(msg);
      }

      const tdPers = document.createElement('td');
      tdPers.className = 'c';
      tdPers.innerHTML = '<span class="persons-badge">' + (r.persons || 1) + '</span>';

      const tdChurch = document.createElement('td');
      tdChurch.className = 'c';
      tdChurch.innerHTML = pill(r.church);

      const tdParty = document.createElement('td');
      tdParty.className = 'c';
      tdParty.innerHTML = pill(r.party);

      const tdDel = document.createElement('td');
      tdDel.className = 'c';
      const btn = document.createElement('button');
      btn.className = 'del';
      btn.textContent = '✕';
      btn.title = 'Șterge confirmarea';
      btn.setAttribute('aria-label', 'Șterge confirmarea lui ' + r.name);
      btn.addEventListener('click', () => removeRsvp(r));
      tdDel.appendChild(btn);

      tr.append(tdName, tdPers, tdChurch, tdParty, tdDel);
      tbody.appendChild(tr);
    });
  }

  async function removeRsvp(r) {
    if (!confirm('Sigur ștergi confirmarea „' + r.name + '"?')) return;
    try {
      const res = await fetch('/api/rsvp/' + encodeURIComponent(SLUG) + '/' + encodeURIComponent(r.id), {
        method: 'DELETE',
        headers: { 'x-admin-password': pw() }
      });
      if (!res.ok) throw new Error();
      allRsvps = allRsvps.filter(x => x.id !== r.id);
      updateStats();
      render();
    } catch {
      alert('Nu am putut șterge confirmarea. Încearcă din nou.');
    }
  }

  async function load(password) {
    const res = await fetch('/api/rsvps/' + encodeURIComponent(SLUG), { headers: { 'x-admin-password': password } });
    if (!res.ok) throw new Error();
    const data = await res.json();
    allRsvps = data.rsvps;
    // statisticile și exportul sunt incluse pentru toate invitațiile
    document.getElementById('st-views-box').style.display = 'block';
    document.getElementById('st-views').textContent = data.views || 0;
    document.getElementById('export-btn').style.display = 'inline-block';
    sessionStorage.setItem(PW_KEY, password);
    updateStats();
    render();
    loginBox.style.display = 'none';
    panel.style.display = 'block';
  }

  async function tryLogin() {
    errBox.classList.remove('show');
    try {
      await load(pwInput.value);
    } catch {
      errBox.classList.add('show');
    }
  }

  document.getElementById('login-btn').addEventListener('click', tryLogin);
  pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });

  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem(PW_KEY);
    panel.style.display = 'none';
    loginBox.style.display = 'block';
    pwInput.value = '';
  });

  document.querySelectorAll('.chip').forEach((chip) => {
    chip.addEventListener('click', () => {
      filter = chip.dataset.filter;
      document.querySelectorAll('.chip').forEach((c) => c.setAttribute('aria-pressed', c === chip ? 'true' : 'false'));
      render();
    });
  });

  document.getElementById('search').addEventListener('input', (e) => {
    query = e.target.value.trim().toLowerCase();
    render();
  });

  // export CSV (pachet Premium) — cu BOM ca Excel să afișeze corect diacriticele
  document.getElementById('export-btn').addEventListener('click', () => {
    const esc = (v) => '"' + String(v ?? '').replaceAll('"', '""') + '"';
    const rows = [['Nume', 'Persoane', 'Biserică', 'Petrecere', 'Mesaj', 'Data confirmării']];
    allRsvps.forEach((r) => rows.push([
      r.name, r.persons || 1, r.church ? 'Da' : 'Nu', r.party ? 'Da' : 'Nu',
      r.message || '', r.createdAt ? new Date(r.createdAt).toLocaleString('ro-RO') : ''
    ]));
    const csv = '\uFEFF' + rows.map((row) => row.map(esc).join(';')).join('\r\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
    a.download = 'confirmari-' + SLUG + '.csv';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  const saved = sessionStorage.getItem(PW_KEY);
  if (saved) load(saved).catch(() => sessionStorage.removeItem(PW_KEY));
</script>
</body>
</html>
